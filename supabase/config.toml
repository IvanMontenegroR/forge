# Config mínima del proyecto Supabase (CLI).
# `project_id` se sobreescribe al hacer `supabase link`.
project_id = "forge"

[functions.coach]
# Verificamos el JWT dentro de la función igualmente; dejarlo en true
# añade una verificación del gateway de Supabase.
verify_jwt = true

[functions.analyze-meal]
# Estimación de calorías por foto. También verifica el JWT internamente.
verify_jwt = true

[functions.generate-program]
# Genera programa con IA (usa service_role para insertar). Verifica JWT.
verify_jwt = true

[functions.ingest-steps]
# Ingesta de pasos desde Apple Shortcuts. Se autentica con steps_token
# personal (no JWT), por eso verify_jwt = false.
verify_jwt = false
